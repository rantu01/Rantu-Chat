<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          let activeFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return activeFetch;
            },
            set(val) {
              console.warn("Overriding window.fetch with custom implementation");
              activeFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Unable to patch window.fetch property getter:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rantu AI Chat</title>
    <link rel="icon" type="image/x-icon" href="https://www.rantumondal.dev/profile-photo.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
